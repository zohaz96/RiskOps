{% extends "base.html" %}

{% block title %}Account Locked{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 text-center mt-5">
        <div class="card border-0 shadow-sm p-4">
            <i class="bi bi-lock text-danger" style="font-size: 3rem;"></i>
            <h4 class="mt-3 fw-bold">Account Locked</h4>
            <p class="text-muted">Too many failed login attempts. Your account has been locked for 1 hour.</p>
            <p class="text-muted small">This is a security measure to protect against brute force attacks (OWASP A07).</p>
            <a href="{% url 'users:login' %}" class="btn btn-outline-primary mt-2">Back to Login</a>
        </div>
    </div>
</div>
{% endblock %}
