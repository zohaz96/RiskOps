name: RiskOps CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-django

      - name: Create static directory
        run: mkdir -p static

      - name: Run Django system check
        env:
          DJANGO_SETTINGS_MODULE: riskops_project.settings
        run: python manage.py check --deploy 2>/dev/null || python manage.py check

      - name: Run pytest
        env:
          DJANGO_SETTINGS_MODULE: riskops_project.settings
        run: pytest tests.py -v